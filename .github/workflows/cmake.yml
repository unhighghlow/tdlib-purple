name: Build and test

on: [push, pull_request, workflow_dispatch]

permissions:
  actions: read
  contents: read
  security-events: write

env:
  # Must match the td submodule commit. Increment TD_MARK to invalidate the TDLib build cache.
  TD_TAG: "49b3bcbb6bfebf2ed44dd9f25102d2e1a94a58c4"
  TD_MARK: "m2"

jobs:
  build_and_test_linux:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - { CMAKE_FLAGS: "-DNoVoip=1", INSTALL_LOTTIE: "n", RUN_TESTS: "y" }
          - { CMAKE_FLAGS: "-DNoVoip=1 -DNoWebp=1", INSTALL_LOTTIE: "n", RUN_TESTS: "n" }
          - { CMAKE_FLAGS: "-DNoVoip=1 -DNoTranslations=1", INSTALL_LOTTIE: "n", RUN_TESTS: "n" }
          - { CMAKE_FLAGS: "-DNoVoip=1 -DNoLottie=1", INSTALL_LOTTIE: "n", RUN_TESTS: "n" }
          - { CMAKE_FLAGS: "-DNoVoip=1 -DNoBundledFmt=1 -DNoBundledLottie=1", INSTALL_FMT: "y", INSTALL_LOTTIE: "y", RUN_TESTS: "n" }
          - { CMAKE_FLAGS: "-DNoVoip=1 -DNoWebp=1 -DNoTranslations=1 -DNoBundledFmt=1 -DNoBundledLottie=1", INSTALL_FMT: "y", INSTALL_LOTTIE: "y", RUN_TESTS: "n" }

    steps:
      - uses: actions/checkout@v7

      - name: Verify TDLib pin
        run: |
          submodule_commit="$(git ls-tree HEAD td | awk '{print $3}')"
          if [ "${submodule_commit}" != "${TD_TAG}" ]; then
            echo "TD_TAG=${TD_TAG}"
            echo "td submodule=${submodule_commit}"
            echo "TDLib workflow pin must match the td submodule commit."
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gettext \
            gperf \
            libgtest-dev \
            libopus-dev \
            libpng-dev \
            libpurple-dev \
            libwebp-dev \
            libwebrtc-audio-processing-dev \
            lzop \
            ninja-build

      - name: Install system rlottie
        if: matrix.INSTALL_LOTTIE == 'y'
        run: sudo apt-get install -y librlottie-dev

      - name: Install system fmt
        if: matrix.INSTALL_FMT == 'y'
        run: sudo apt-get install -y libfmt-dev

      - name: Check tool versions
        run: |
          c++ --version
          cmake --version
          ninja --version
          gettext --version

      - name: Lint translations
        env:
          LINTACCEL_IGNORE_MISSING: y
        run: ./po/lint_accelerators.py

      - name: Cache TDLib build
        uses: actions/cache@v5
        with:
          path: .ga_cache/td_destdir_${{ env.TD_TAG }}_${{ env.TD_MARK }}.tar*
          key: ${{ runner.os }}-td-${{ env.TD_TAG }}-${{ env.TD_MARK }}

      - name: Restore or create TDLib build
        run: ./.github/ga_build_td.sh "${TD_TAG}" "${TD_MARK}"

      - name: Configure
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_CXX_FLAGS="-DGLIB_DISABLE_DEPRECATION_WARNINGS -Werror -Wall -Wextra -Wformat=2 -Wformat-signedness -Wno-unused-parameter -Wno-parentheses" \
            -DTd_DIR=td_destdir/usr/local/lib/cmake/Td \
            ${{ matrix.CMAKE_FLAGS }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: manual
          config-file: ./.github/codeql/config.yml

      - name: Build plugin
        run: cmake --build build --target telegram-tdlib

      - name: Build tests
        if: matrix.RUN_TESTS == 'y'
        run: cmake --build build --target tests

      - name: Run tests
        if: matrix.RUN_TESTS == 'y'
        run: cmake --build build --target run-tests

      - name: Test installation
        run: DESTDIR=tdprpl_destdir cmake --build build --target install

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
